name: "fedora-39"
detect:
  os: "fedora"
  version: "39"
firmware:
  x86_64:
    code: "/usr/share/edk2/ovmf/OVMF_CODE.fd"
    vars: "/usr/share/edk2/ovmf/OVMF_VARS.fd"
  aarch64:
    code: "/usr/share/edk2/aarch64/QEMU_EFI-pflash.raw"
    vars: "/usr/share/edk2/aarch64/QEMU_EFI-qemuvars-pflash.raw"
qemu:
  aarch64_binary: "qemu-system-aarch64"
